name: CI Pipeline

'on':
  push:
    branches:
      - main
      - develop
      - feature/ci-pipeline
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test

      - name: Run Code Quality Checks
        run: npm run lint

      - name: Build Artifact
        run: npm run build