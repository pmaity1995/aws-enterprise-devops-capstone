replicaCount: 1

image:
  repository: 484826611947.dkr.ecr.ap-south-1.amazonaws.com/aws-enterprise-devops-capstone
  tag: latest
  pullPolicy: Always

containerPort: 3000

service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 30460

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10